name: "AI Cognitive Load Management Environment"
description: >
  A benchmark environment predicting and managing human cognitive load, stress, fatigue, and burnout. 
  Evaluates an agent's ability to schedule tasks adaptively under uncertainty and high-pressure scenarios, prioritizing both productivity and mental well-being.
version: "1.0.0"
category: "Cognitive Modeling"
observation_space:
  type: "dict"
  schema:
    current_time_step: "float"
    stress_level: "float"
    energy_level: "float"
    work_streak: "int"
    fatigue_multiplier: "float"
    active_tasks: "list[dict]"
    completed_tasks: "list[dict]"
    missed_tasks: "list[dict]"
action_space:
  type: "dict"
  schema:
    action_type: "string"
    task_id: "string"
    duration: "float"
    chunks: "int"
    new_deadline: "float"
tasks:
  - id: "easy_schedule"
    description: "Manage a simple schedule with 2 stable tasks."
  - id: "medium_load"
    description: "Handle 3 tasks with potential interruptions."
  - id: "hard_burnout"
    description: "Navigate a high-stress environment with 4+ tasks and crisis events."
entry_point: "server.app:main"

